name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at midnight

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been automatically marked as stale due to inactivity. It will be closed in 7 days if no further activity occurs.'
          stale-pr-message: 'This pull request has been automatically marked as stale due to inactivity. Please update or it will be closed in 7 days.'
          close-issue-message: 'This issue was closed due to inactivity. Please reopen if this is still relevant.'
          close-pr-message: 'This pull request was closed due to inactivity. Please reopen when ready.'
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,in-progress'
          exempt-pr-labels: 'wip,in-review'
          remove-stale-when-updated: true
